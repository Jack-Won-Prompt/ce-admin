name: ce_app
description: "CE Admin 모바일 앱 — 의료기기 주문/청구 관리"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP 통신
  dio: ^5.7.0                     # API 클라이언트
  retrofit: ^4.4.1                # REST API 코드 생성

  # 상태관리
  flutter_riverpod: ^2.6.1        # Riverpod 상태관리
  riverpod_annotation: ^2.6.1

  # 라우팅
  go_router: ^15.1.2

  # 로컬 저장소
  shared_preferences: ^2.3.4      # 토큰·설정 저장
  flutter_secure_storage: ^9.2.4  # 민감 정보 암호화 저장

  # 채팅 & 알림
  pusher_channels_flutter: ^2.1.0      # Pusher 실시간 채팅
  flutter_local_notifications: ^18.0.0 # 로컬 푸시 알림

  # FCM (백그라운드 알림)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # UI
  intl: ^0.20.2                   # 날짜·숫자 포맷 (한국어)
  cached_network_image: ^3.4.1    # 이미지 캐시
  image_picker: ^1.1.2            # 갤러리 이미지 선택
  camera: ^0.11.0+2              # 커스텀 카메라 (프레임 가이드)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  retrofit_generator: ^9.1.6
  riverpod_generator: ^2.6.3
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
